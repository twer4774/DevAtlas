services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: devatlas
      MINIO_ROOT_PASSWORD: devatlas123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 devatlas devatlas123 &&
      mc mb local/akw --ignore-existing &&
      mc mb local/gittrack-attachments --ignore-existing &&
      echo 'Buckets ready'
      "
    restart: "no"

  # ── Backends ─────────────────────────────────────────────────────────────────

  portal-backend:
    build:
      context: ./Portal/backend
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/portal
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      CORS_ORIGINS: "http://localhost:5174,http://localhost:5173,http://localhost:5175"
      PORTAL_FRONTEND_URL: "http://localhost:5174"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy

  akw-backend:
    build:
      context: ./AKW/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/akw
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: devatlas
      S3_SECRET_KEY: devatlas123
      S3_BUCKET: akw
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174,http://localhost:5175"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  gittrack-backend:
    build:
      context: ./GitTrack/backend
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/gittrack
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: gittrack-attachments
      S3_ACCESS_KEY: devatlas
      S3_SECRET_KEY: devatlas123
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174,http://localhost:5175"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ── Frontends ────────────────────────────────────────────────────────────────

  portal-frontend:
    build:
      context: ./Portal/frontend
    ports:
      - "5174:5174"
    environment:
      VITE_API_TARGET: http://portal-backend:8001
    depends_on:
      - portal-backend

  akw-frontend:
    build:
      context: ./AKW/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://akw-backend:8000
    depends_on:
      - akw-backend

  gittrack-frontend:
    build:
      context: ./GitTrack/frontend
    ports:
      - "5175:5175"
    environment:
      VITE_API_TARGET: http://gittrack-backend:8000
    depends_on:
      - gittrack-backend

volumes:
  db-data:
  minio-data:
